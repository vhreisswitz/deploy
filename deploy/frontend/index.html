<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>

    <link rel="stylesheet" href="produto.css">
</head>

<body>

    <div class="container">

        <h1>Cadastro de Produto</h1>

        <form id="formProduto">

            <input
                type="text"
                id="nome"
                placeholder="Nome do produto"
                required>

            <input
                type="number"
                id="preco"
                placeholder="Preço"
                step="0.01"
                required>

            <input
                type="number"
                id="quantidade"
                placeholder="Quantidade"
                required>

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <hr>

        <h2>Produtos Cadastrados</h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Quantidade</th>
                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="listaProdutos">

            </tbody>

        </table>

    </div>

    <script type="module" src="produto.js"></script>

</body>

</html>
